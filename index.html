<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة البحث الموجه</title>
    <style>
        /* كود الخلفية الزرقاء والمدرجة بالأسود */
        body {
            background: linear-gradient(135deg, #001f3f, #0074D9, #000000);
            background-size: 400% 400%;
            color: #ffffff; /* لجعل لون النصوص أبيض وواضح */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* حاوية صندوق البحث */
        .search-box {
            display: flex;
            gap: 10px;
            width: 50%;
            max-width: 600px;
        }

        /* تنسيق مربع البحث */
        input[type="search"] {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #0074D9;
            border-radius: 8px;
            outline: none;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        /* تنسيق زر البحث */
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #0074D9;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #001f3f;
            border: 1px solid #0074D9;
        }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="search" id="searchInput" placeholder="اكتب الكلمة المفتاحية هنا...">
        <button onclick="checkKeyword()">بحث</button>
    </div>

    <script>
        // هنا تضع الكلمات المفتاحية والمواقع المقابلة لها
        const linksMap = {
            "Beta": "https://drive.google.com/file/d/1GPSV9u_wD3A4W-RLkG0K-Wt_FDhOv4Ty/view?usp=drivesdk",
            "كلر": "https://drive.google.com/file/d/1p6ZmCRkq5J4ZTOqxKeXVV141gEzCvqGI/view?usp=drivesdk",
            "Kick": "https://www.kick.com",
            "هاشم": "https://drive.google.com/file/d/1MJRaxqo00kwaA_E4Tvw6B_O2TdpOX_rf/view?usp=drivesdk"
            // يمكنك إضافة المزيد هنا بنفس الطريقة: "الكلمة": "الرابط",
        };

        function checkKeyword() {
            // أخذ النص المكتوب وحذف الفراغات الزائدة
            const query = document.getElementById("searchInput").value.trim();

            // التحقق إذا كانت الكلمة موجودة في القائمة لدينا
            if (linksMap[query]) {
                // الانتقال إلى الموقع في نفس التبويب
                window.location.href = linksMap[query]; 
                
                // إذا كنت تفضل فتح الموقع في تبويب جديد، احذف السطر العلوي وفدّل هذا السطر:
                // window.open(linksMap[query], '_blank');
            } else {
                alert("الكلمة المفتاحية غير مسجلة! جرب كلمات مثل: جوجل، يوتيوب، تويتر.");
            }
        }

        // كود إضافي: لتفعيل الانتقال عند الضغط على زر Enter في الكيبورد
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkKeyword();
            }
        });
    </script>

</body>
</html>
